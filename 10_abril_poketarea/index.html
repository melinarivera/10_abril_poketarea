<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mega PokeTarea</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <h1>Pokédex</h1>
      <p>Explora la lista de Pokémon y haz click para ver su imagen más grande</p>
    </header>

    <main class="main">
      <section class="barra-superior">
        <input
          type="text"
          id="buscador"
          placeholder="Buscar Pokémon por nombre..."
        />
      </section>

      <section id="mensajeCarga" class="mensaje-carga">
        Cargando Pokémon...
      </section>

      <section id="contenedorCards" class="cards"></section>
    </main>

    <div id="modalContainer"></div>

    <script type="module" src="main.js"></script>
  </body>
</html>
